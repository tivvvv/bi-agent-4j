spring:
  application:
    name: bi-agent-4j
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bi_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  ai:
    openai:
      api-key: ${CHAT_API_KEY}
      chat:
        options:
          model: qwen3-max
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        api-key: ${CHAT_API_KEY}
      embedding:
        options:
          model: BAAI/bge-m3
        base-url: https://api.siliconflow.cn
        api-key: ${EMBEDDING_API_KEY}

server:
  port: 8115

logging:
  level:
    root: info
  file:
    path: ./logs